name: Daily Coop Store Refresh

on:
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: app/package-lock.json

      - name: Install Dependencies
        working-directory: app
        run: npm ci

      - name: Refresh Coop Stores
        working-directory: app
        env:
          COOP_CONCURRENCY: "6"
          COOP_REQUEST_DELAY_MS: "200"
        run: npm run fetch:coop

      - name: Commit and Push if Changed
        run: |
          if git diff --quiet -- app/public/coop_stores.geojson; then
            echo "No store data changes detected."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add app/public/coop_stores.geojson
          git commit -m "chore: daily coop store refresh"
          git push origin main
